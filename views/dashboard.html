<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - API Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>API Admin</h2>
            <ul class="nav-links">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/database">Database Viewer</a></li>
                <li><a href="/activity">Live Activity</a></li>
                <li><a href="/status">Server Status</a></li>
                <li><a href="/docs" target="_blank">API Docs</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="topbar">
                <h1>Dashboard</h1>
                <button id="theme-toggle" class="theme-toggle">☀️</button>
            </div>

            <div class="card-grid">
                <div class="card">
                    <h3>Total Users</h3>
                    <div class="value" id="count-users">-</div>
                </div>
                <div class="card">
                    <h3>Total Products</h3>
                    <div class="value" id="count-products">-</div>
                </div>
                <div class="card">
                    <h3>Total Orders</h3>
                    <div class="value" id="count-orders">-</div>
                </div>
                <div class="card">
                    <h3>API Requests</h3>
                    <div class="value" id="count-requests">-</div>
                </div>
            </div>

            <h2>Server Status</h2>
            <div class="card-grid mt-2">
                <div class="card">
                    <h3>Server Uptime</h3>
                    <div class="value" id="uptime">-</div>
                </div>
                <div class="card">
                    <h3>Database Status</h3>
                    <div class="value" id="db-status">-</div>
                </div>
                <div class="card">
                    <h3>Realtime Status</h3>
                    <div class="value" id="rt-status">Connecting...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/main.js"></script>
    <script>
        // Supabase configuration - User will inject via .env on server, but client needs it for realtime
        // For security, client could just fetch data from our API, but user asked for Supabase Realtime on frontend
        // We will fetch keys from a new config endpoint or just poll API if keys are not public.
        // Wait, the API key is provided and user wants realtime. 
        // Let's create an endpoint or just fetch stats from our API instead for counts.
        
        async function fetchCounts() {
            const resources = ['users', 'products', 'orders'];
            for (const res of resources) {
                try {
                    const response = await fetch(`/${res}?_limit=1`);
                    const data = await response.json();
                    if (data.meta) {
                        document.getElementById(`count-${res}`).innerText = data.meta.total;
                    }
                } catch(e) {}
            }
            
            try {
                const statRes = await fetch('/api/stats');
                const statData = await statRes.json();
                document.getElementById('count-requests').innerText = statData.data.requestCount;
                document.getElementById('uptime').innerText = Math.floor(statData.data.uptime) + 's';
                document.getElementById('db-status').innerText = 'Connected';
            } catch(e) {}
        }
        
        // Initial fetch
        fetchCounts();
        
        // Polling as a fallback if realtime isn't configured in client
        setInterval(fetchCounts, 5000);
        
        // Using EventSource for server events
        const evtSource = new EventSource("/activity-stream");
        evtSource.onmessage = function(event) {
            // Update stats dynamically
            fetchCounts();
            document.getElementById('rt-status').innerText = 'Connected (SSE)';
            document.getElementById('rt-status').style.color = '#4caf50';
        };
        evtSource.onerror = function(err) {
            document.getElementById('rt-status').innerText = 'Disconnected';
            document.getElementById('rt-status').style.color = '#f44336';
        };
    </script>
</body>
</html>
