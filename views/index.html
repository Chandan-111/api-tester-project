<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Learning Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <h1 class="mb-2" style="font-size: 3rem; color: var(--primary-color);">API Learning Server</h1>
        <p class="mb-2" style="max-width: 600px; color: var(--text-secondary);">

        <div class="flex">

    <script src="/js/main.js"></script>

</html>
